      <stop offset="0%"  stop-color="#004433"/>
      <stop offset="50%" stop-color="#006b50"/>
      <stop offset="100%" stop-color="#4edea3"/>
    </linearGradient>
    <linearGradient id="lt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6ffbbe" stop-opacity="0.9"/>
